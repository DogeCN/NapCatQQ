name: Build NapCat Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: write-all

jobs:
  check:
    name: Type Check & Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone Main Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: pnpm i
      - name: Type Check
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Run Tests
        run: pnpm test

  build:
    name: Build NapCat (Full Build)
    needs: check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Clone Main Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Generate Version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo "v0.0.0")
          BASE_VERSION="${LATEST_TAG#v}"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE_VERSION}-main.${{ github.run_number }}+${SHORT_SHA}"
          echo "NAPCAT_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Latest tag: ${LATEST_TAG}"
          echo "Build version: ${VERSION}"
      - name: Build NapCat (Full Build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAPCAT_VERSION: ${{ env.NAPCAT_VERSION }}
        run: |
          pnpm i
          pnpm --filter napcat-webui-frontend run build || exit 1
          pnpm run build:framework
          pnpm run build:shell
          pnpm --filter napcat-plugin-builtin run build || exit 1
          mv packages/napcat-framework/dist framework-dist
          mv packages/napcat-shell/dist shell-dist
          cd framework-dist
          npm install --omit=dev
          rm -f ./package-lock.json
          cd ../shell-dist
          npm install --omit=dev
          rm -f ./package-lock.json
      - name: Upload Artifact (Framework)
        uses: actions/upload-artifact@v6
        with:
          name: NapCat.Framework
          path: framework-dist
      - name: Upload Artifact (Shell)
        uses: actions/upload-artifact@v6
        with:
          name: NapCat.Shell
          path: shell-dist