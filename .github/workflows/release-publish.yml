name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v4.10.7)'
        required: true
        type: string

permissions: write-all

env:
  RELEASE_NAME: "NapCat"

jobs:
  build:
    name: Build NapCat (Full Build)
    runs-on: ubuntu-latest
    steps:
      - name: Clone Main Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Build NapCat (Full Build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm i
          pnpm --filter napcat-webui-frontend run build || exit 1
          pnpm run build:framework
          pnpm run build:shell
          pnpm --filter napcat-plugin-builtin run build || exit 1
          mv packages/napcat-framework/dist framework-dist
          mv packages/napcat-shell/dist shell-dist
          cd framework-dist
          npm install --omit=dev
          rm -f ./package-lock.json
          cd ../shell-dist
          npm install --omit=dev
          rm -f ./package-lock.json
      - name: Upload Artifact (Framework)
        uses: actions/upload-artifact@v6
        with:
          name: NapCat.Framework
          path: framework-dist
      - name: Upload Artifact (Shell)
        uses: actions/upload-artifact@v6
        with:
          name: NapCat.Shell
          path: shell-dist

  release-napcat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifacts

      - name: Zip Artifacts
        run: |
            cd artifacts
            [ -d NapCat.Framework ] && (cd NapCat.Framework && zip -qr ../../NapCat.Framework.zip .)
            [ -d NapCat.Shell ] && (cd NapCat.Shell && zip -qr ../../NapCat.Shell.zip .)
            cd ..

      - name: Generate release note
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ inputs.version }}"

          TAGS_JSON=$(curl -s "https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/tags?per_page=100")
          TAGS=( $(echo "$TAGS_JSON" | jq -r '.[].name' | sort -V) )

          PREV_TAG=""
          for i in "${!TAGS[@]}"; do
            if [ "${TAGS[$i]}" = "$CURRENT_TAG" ]; then
              if [ $i -gt 0 ]; then
                PREV_TAG="${TAGS[$((i-1))]}"
              fi
              break
            fi
          done

          if [ -z "$PREV_TAG" ]; then
            echo "Could not find previous tag for $CURRENT_TAG, using first commit"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi

          COMMITS=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG".."$CURRENT_TAG" 2>/dev/null || git log --pretty=format:'- %s (%h)' -20)
          echo "$COMMITS" > commits.txt

          sed "s/{VERSION}/$CURRENT_TAG/g; s/{PREV_VERSION}/$PREV_TAG/g; s|{REPO}|${GITHUB_REPOSITORY}|g" .github/prompt/default.md > CHANGELOG.md
          echo "=== generated release note ==="
          cat CHANGELOG.md

      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: NapCat ${{ inputs.version }}
          body_path: CHANGELOG.md
          files: |
            NapCat.Framework.zip
            NapCat.Shell.zip
          draft: false